<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 - Live Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f8fafc; color: #0f172a; }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="flex items-center justify-between mb-8 border-b border-slate-200 pb-4">
            <h1 class="text-3xl font-bold text-slate-900">World Cup 2026 Games</h1>
            <button onclick="fetchGames()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-semibold text-sm transition-colors">
                Refresh API
            </button>
        </div>

        <div class="mb-8 bg-slate-900 rounded-lg p-4 shadow-lg text-sm font-mono">
            <div class="text-slate-400 mb-2 font-bold uppercase tracking-wider text-xs">API Connection Monitor</div>
            <div id="api-status" class="text-yellow-400 flex items-center gap-2">
                <div class="w-4 h-4 border-2 border-yellow-400 rounded-full loader"></div>
                Waiting to fetch data...
            </div>
            <div id="api-raw-output" class="mt-3 text-slate-300 text-xs break-words max-h-32 overflow-y-auto bg-slate-950 p-2 rounded hidden"></div>
        </div>

        <div id="games-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        const API_URL = 'https://worldcup26.ir/get/games';
        // A reliable proxy specifically for bypassing CORS blocks on local HTML files
        const PROXY_URL = 'https://api.allorigins.win/get?url=';

        const statusEl = document.getElementById('api-status');
        const rawOutputEl = document.getElementById('api-raw-output');
        const gamesContainer = document.getElementById('games-container');

        function logStatus(message, type = 'info') {
            let color = 'text-yellow-400';
            if (type === 'success') color = 'text-green-400';
            if (type === 'error') color = 'text-red-400';
            
            statusEl.className = `${color} flex items-center gap-2`;
            statusEl.innerHTML = type === 'info' 
                ? `<div class="w-4 h-4 border-2 border-yellow-400 rounded-full loader"></div> ${message}`
                : `<div>${type === 'success' ? '✓' : '✗'}</div> ${message}`;
        }

        function showRawResponse(text) {
            rawOutputEl.classList.remove('hidden');
            rawOutputEl.innerText = text.substring(0, 500) + (text.length > 500 ? '\n\n...[TRUNCATED]' : '');
        }

        async function fetchGames() {
            logStatus('Attempting direct connection to ' + API_URL + '...');
            gamesContainer.innerHTML = '';
            rawOutputEl.classList.add('hidden');
            rawOutputEl.innerText = '';

            let rawText = '';
            let jsonData = null;

            // STEP 1: Try Direct Connection
            try {
                const response = await fetch(API_URL);
                rawText = await response.text(); // Read as text first to see exactly what the server sends
                jsonData = JSON.parse(rawText);
                logStatus('Direct connection successful!', 'success');
            } catch (directError) {
                logStatus('Direct connection failed (Likely CORS). Routing through proxy...', 'info');
                
                // STEP 2: Try Proxy Connection
                try {
                    const proxyResponse = await fetch(PROXY_URL + encodeURIComponent(API_URL));
                    const proxyJson = await proxyResponse.json();
                    
                    // allorigins returns the actual API response inside a 'contents' string
                    rawText = proxyJson.contents; 
                    
                    if (!rawText) {
                        throw new Error("Proxy received an empty response from the server.");
                    }

                    jsonData = JSON.parse(rawText);
                    logStatus('Proxy connection successful!', 'success');

                } catch (proxyError) {
                    logStatus('API Failure. See raw output below.', 'error');
                    if (rawText) {
                        showRawResponse("SERVER RETURNED THIS NON-JSON RESPONSE:\n\n" + rawText);
                    } else {
                        showRawResponse("NETWORK ERROR:\n\n" + proxyError.message);
                    }
                    return; // Stop execution
                }
            }

            // STEP 3: Ensure data is an array and render
            showRawResponse("SUCCESSFUL PAYLOAD:\n\n" + JSON.stringify(jsonData, null, 2));
            
            // Extract the array depending on how the API wraps it (e.g., { data: [...] } or just [...])
            const gamesArray = Array.isArray(jsonData) ? jsonData : (jsonData.data || jsonData.games || []);

            if (gamesArray.length === 0) {
                gamesContainer.innerHTML = '<div class="col-span-full text-slate-500">API connected, but returned 0 games.</div>';
                return;
            }

            renderGames(gamesArray);
        }

function renderGames(games) {
            gamesContainer.innerHTML = games.map(game => {
                // Parse scores
                const hScore = game.home_score ?? '-';
                const aScore = game.away_score ?? '-';
                const isFinished = game.finished === "TRUE";

                // Function to clean the specific scorer format: {"Name 1'", "Name 2'"}
                const parseScorers = (raw) => {
                    if (!raw || raw === "null" || raw === "{}") return "";
                    // Remove curly braces and quotes
                    return raw.replace(/[{}"“]/g, '').split(',').join(', ');
                };

                const homeScorers = parseScorers(game.home_scorers);
                const awayScorers = parseScorers(game.away_scorers);

                return `
                    <div class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm flex flex-col h-full">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Group ${game.group}</span>
                            <span class="text-[10px] font-bold px-2 py-1 ${isFinished ? 'bg-slate-100 text-slate-600' : 'bg-blue-100 text-blue-700'} rounded uppercase border border-slate-200">
                                ${isFinished ? 'FT' : 'Upcoming'}
                            </span>
                        </div>
                        
                        <div class="space-y-4 flex-grow">
                            <div class="flex justify-between items-center">
                                <span class="font-semibold text-slate-900">${game.home_team_name_en}</span>
                                <span class="font-bold text-xl ${isFinished ? 'text-slate-900' : 'text-slate-300'}">${hScore}</span>
                            </div>
                            ${homeScorers ? `<div class="text-[10px] text-slate-500 italic">⚽ ${homeScorers}</div>` : ''}
                            
                            <div class="flex justify-between items-center border-t border-slate-50 pt-3">
                                <span class="font-semibold text-slate-900">${game.away_team_name_en}</span>
                                <span class="font-bold text-xl ${isFinished ? 'text-slate-900' : 'text-slate-300'}">${aScore}</span>
                            </div>
                            ${awayScorers ? `<div class="text-[10px] text-slate-500 italic">⚽ ${awayScorers}</div>` : ''}
                        </div>

                        <div class="mt-6 pt-4 border-t border-slate-100 text-[10px] text-slate-400 font-bold uppercase tracking-wider">
                            ${game.local_date}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Run immediately
        window.onload = fetchGames;
    </script>
</body>
</html>
