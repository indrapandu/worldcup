<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 Update</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --line-soft: #f0f2f4;
      --soft: #f9fafb;
      --accent: #111827;
      --blue: #2563eb;
      --green: #16a34a;
      --yellow: #ca8a04;
      --red: #dc2626;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--card);
      box-shadow: var(--shadow);
    }

.topbar {
      padding: 18px 24px;
      border-bottom: 1px solid rgba(229, 231, 235, 0.85);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      background:
        radial-gradient(circle at 12% 18%, rgba(37, 99, 235, 0.10), transparent 30%),
        radial-gradient(circle at 92% 8%, rgba(22, 163, 74, 0.10), transparent 28%),
        linear-gradient(135deg, rgba(255,255,255,0.96), rgba(249,250,251,0.96));
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(14px);
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.05);
    }

    .brand-shell {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: -0.4px;
      background:
        linear-gradient(135deg, #111827 0%, #1d4ed8 52%, #16a34a 100%);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.20);
      position: relative;
      overflow: hidden;
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      width: 28px;
      height: 28px;
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 999px;
      right: -8px;
      bottom: -8px;
    }

    .brand {
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 3px;
      font-size: 11px;
      font-weight: 800;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .eyebrow::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.12);
    }

    .brand h1 {
      margin: 0;
      font-size: 23px;
      line-height: 1.08;
      letter-spacing: -0.6px;
      color: var(--text);
    }

    .header-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 22px;
      padding: 4px 9px;
      border: 1px solid rgba(229, 231, 235, 0.95);
      border-radius: 999px;
      background: rgba(255,255,255,0.78);
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
      line-height: 1;
      box-shadow: 0 1px 0 rgba(15, 23, 42, 0.03);
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.12);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .refresh-btn {
      border: 1px solid rgba(17, 24, 39, 0.10);
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      font-weight: 750;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 12px 24px rgba(17, 24, 39, 0.16);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .refresh-btn:hover {
      background: #0b1220;
      transform: translateY(-1px);
      box-shadow: 0 14px 26px rgba(17, 24, 39, 0.20);
    }

    .refresh-btn:active {
      transform: translateY(0);
      box-shadow: 0 8px 16px rgba(17, 24, 39, 0.14);
    }

.tabs {
  display: flex;
  gap: 4px;
  padding: 0 24px;
  background: #fff;
  border-bottom: 1px solid var(--line);
  overflow-x: auto;

  position: sticky;
  top: var(--topbar-height, 72px);
  z-index: 9;
}

    .tab-btn {
      border: none;
      background: transparent;
      padding: 14px 16px 12px;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
    }

    .tab-btn.active {
      color: var(--text);
      font-weight: 700;
      border-bottom-color: var(--accent);
    }

    .status-line {
      padding: 10px 24px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
      background: var(--soft);
    }

    .status-line.hidden {
      display: none;
    }

    .view {
      display: none;
      padding: 22px 24px 34px;
    }

    .view.active {
      display: block;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 17px;
      font-weight: 750;
      letter-spacing: -0.2px;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .kpi-card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 16px;
      padding: 15px;
      min-height: 96px;
    }

    .kpi-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.6px;
    }

    .kpi-note {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.35;
    }

.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  align-items: start;
}

.dashboard-grid .panel {
  height: auto;
}

.progress-summary {
  margin-bottom: 14px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--soft);
  font-size: 13px;
  color: var(--muted);
}

.progress-summary strong {
  color: var(--text);
}
    
.progress-count {
  margin-top: 3px;
  font-size: 10.5px;
  color: var(--muted);
  font-weight: 500;
  line-height: 1.25;
}
.risk-list {
  display: block;
}

.group-health-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.group-health-column {
  display: grid;
  gap: 8px;
  align-content: start;
}

.health-item {
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 9px 10px;
  background: #fff;
}

.health-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 7px;
}

.health-title {
  font-size: 12.5px;
  font-weight: 750;
  margin: 0;
}

.health-count {
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
}

.health-progress {
  height: 6px;
  background: #eef2f7;
  border-radius: 999px;
  overflow: hidden;
}

.health-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 999px;
}

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    .two-col.single-col {
      grid-template-columns: 1fr;
    }

    .panel {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      min-width: 0;
    }

    .progress-row {
      display: grid;
      grid-template-columns: 150px 1fr 52px;
      gap: 12px;
      align-items: center;
      margin: 14px 0;
    }

    .progress-name {
      font-size: 13px;
      color: var(--text);
      font-weight: 600;
    }

    .progress-track {
      height: 10px;
      background: #eef2f7;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
    }

    .progress-percent {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
    }

    .lookahead-list,
    .risk-list,
    .critical-list {
      display: grid;
      gap: 10px;
    }

    .mini-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: #fff;
    }

    .mini-card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
      font-size: 13px;
      font-weight: 750;
    }

    .mini-card-sub {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    .lookahead-match-card {
      display: grid;
      gap: 8px;
    }

    .lookahead-title-row {
      align-items: flex-start;
      margin-bottom: 4px;
    }

    .lookahead-match-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .lookahead-top-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: wrap;
      flex: 0 0 auto;
    }

    .match-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .match-date-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 4px 9px;
      border-radius: 999px;
      background: #f3f4f6;
      color: var(--text);
      font-size: 11px;
      font-weight: 750;
    }

    .priority-line {
      margin-top: 6px;
      color: var(--muted);
    }

    .health-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .health-main {
      min-width: 0;
    }

    .health-title {
      font-size: 13px;
      font-weight: 750;
      margin-bottom: 5px;
    }

    .health-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .health-progress {
      margin-top: 9px;
      height: 7px;
      background: #eef2f7;
      border-radius: 999px;
      overflow: hidden;
    }

    .health-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 22px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 10.5px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.green {
      color: #166534;
      background: #dcfce7;
    }

    .badge.yellow {
      color: #854d0e;
      background: #fef3c7;
    }

    .badge.red {
      color: #991b1b;
      background: #fee2e2;
    }

    .badge.blue {
      color: #1d4ed8;
      background: #dbeafe;
    }

    .badge.gray {
      color: #374151;
      background: #f3f4f6;
    }

    .empty-state {
      padding: 24px;
      color: var(--muted);
      font-size: 14px;
    }

    .day-header {
      margin: 16px -24px 0;
      padding: 13px 24px;
      background: var(--soft);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      font-weight: 700;
    }

    .match-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      margin: 0 -24px;
    }

    .match-card {
      min-height: 150px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr 118px;
      gap: 16px;
      background: #fff;
    }

    .match-card:nth-child(odd) {
      border-right: 1px solid var(--line);
    }

    .match-card:hover {
      background: #fcfdff;
    }

    .group-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .team-row {
      display: grid;
      grid-template-columns: 32px 1fr 26px;
      align-items: center;
      gap: 10px;
      min-height: 34px;
    }

    .flag {
      width: 24px;
      height: 18px;
      object-fit: cover;
      border-radius: 3px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.1);
    }

    .team-name {
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .score {
      text-align: right;
      font-size: 14px;
      font-weight: 700;
    }

    .time-panel {
      border-left: 1px solid var(--line);
      padding-left: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .time-main {
      font-size: 16px;
      font-weight: 800;
      margin: 5px 0;
    }

    .time-note {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.35;
    }

    .red-card {
      display: inline-block;
      width: 8px;
      height: 12px;
      background: #d93025;
      border-radius: 2px;
      transform: rotate(10deg);
      margin-left: 6px;
      vertical-align: -1px;
    }

    .table-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .standings-block {
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: #fff;
    }

    .standings-title {
      margin: 0;
      padding: 14px 16px;
      font-size: 17px;
      font-weight: 800;
      border-bottom: 1px solid var(--line);
      background: var(--soft);
    }

    .standings-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .standings-table th {
      height: 30px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      text-align: center;
      border-bottom: 1px solid var(--line);
    }

    .standings-table td {
      height: 42px;
      font-size: 12px;
      text-align: center;
      border-bottom: 1px solid var(--line-soft);
      padding: 0 2px;
    }

    .standings-table tr:last-child td {
      border-bottom: none;
    }

    .rank-col {
      width: 28px;
    }

    .team-col {
      width: auto;
    }

    .stat-col {
      width: 32px;
    }

    .team-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      text-align: left;
    }

    .team-cell img {
      width: 22px;
      height: 16px;
      object-fit: cover;
      border-radius: 2px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.1);
      flex: 0 0 auto;
    }

    .team-cell span {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .pts {
      font-weight: 800;
    }

    .venue-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .venue-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
    }

    .venue-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .venue-name {
      font-size: 14px;
      font-weight: 800;
    }

    .venue-city {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .bar-track {
      height: 8px;
      border-radius: 999px;
      background: #eef2f7;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--blue);
    }
    
    .site-footer {
      border-top: 1px solid var(--line);
      background: #fff;
      padding: 18px 24px 24px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      display: grid;
      gap: 5px;
    }

    .site-footer a {
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
      border-bottom: 1px solid rgba(17, 24, 39, 0.22);
    }

    .site-footer a:hover {
      border-bottom-color: var(--text);
    }

    .site-footer .disclaimer {
      margin-top: 3px;
      color: #9ca3af;
      font-size: 11px;
    }
    @media (max-width: 980px) {
      .kpi-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .dashboard-grid,
      .two-col,
      .table-layout,
      .venue-grid {
        grid-template-columns: 1fr;
      }

      .match-grid {
        grid-template-columns: 1fr;
      }

      .match-card:nth-child(odd) {
        border-right: none;
      }
    }

    @media (max-width: 620px) {
      body {
        background: #fff;
      }

      .app {
        box-shadow: none;
      }

      .topbar {
        padding: 14px;
        align-items: flex-start;
      }

      .brand-shell {
        gap: 10px;
      }

      .brand-mark {
        width: 40px;
        height: 40px;
        border-radius: 14px;
        font-size: 13px;
      }

      .eyebrow {
        font-size: 10px;
      }

      .brand h1 {
        font-size: 18px;
      }

      .header-meta {
        gap: 5px;
        margin-top: 7px;
      }

      .meta-pill {
        font-size: 10px;
        padding: 4px 7px;
      }

      .header-actions {
        margin-top: 1px;
      }

      .refresh-btn {
        padding: 9px 11px;
        font-size: 11px;
      }

      .lookahead-title-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .lookahead-match-title {
        white-space: normal;
      }

      .lookahead-top-right {
        justify-content: flex-start;
      }

      .tabs {
        padding: 0 14px;
      }

      .tab-btn {
        padding: 12px 13px 10px;
        font-size: 13px;
      }

      .view {
        padding: 18px 14px 28px;
      }

      .status-line {
        padding-left: 14px;
        padding-right: 14px;
      }

      .kpi-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .kpi-card {
        padding: 12px;
        min-height: 86px;
      }

      .kpi-value {
        font-size: 23px;
      }

      .panel {
        padding: 14px;
        border-radius: 15px;
      }

.progress-row {
  grid-template-columns: 125px 1fr 42px;
  gap: 8px;
}

      .progress-name {
        font-size: 11px;
      }

      .day-header {
        margin-left: -14px;
        margin-right: -14px;
        padding-left: 14px;
        padding-right: 14px;
      }

      .match-grid {
        margin-left: -14px;
        margin-right: -14px;
      }

      .match-card {
        grid-template-columns: 1fr 96px;
        padding: 17px 14px;
        min-height: 138px;
      }

      .time-panel {
        padding-left: 10px;
      }

      .team-row {
        grid-template-columns: 28px 1fr 23px;
        gap: 7px;
      }

      .team-name {
        font-size: 13px;
      }

      .score {
        font-size: 13px;
      }

      .standings-title {
        font-size: 15px;
        padding: 12px;
      }

      .standings-table th {
        font-size: 9.8px;
      }

      .standings-table td {
        height: 38px;
        font-size: 10.8px;
        padding: 0 1px;
      }

      .rank-col {
        width: 22px;
      }

      .stat-col {
        width: 26px;
      }

      .team-cell {
        gap: 5px;
      }

      .team-cell img {
        width: 18px;
        height: 13px;
      }

      .team-cell span {
        font-size: 10.5px;
      }
      .group-health-grid {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      
      .health-item {
        padding: 8px 9px;
      }
      
      .health-title {
        font-size: 12px;
      }
      
      .health-count {
        font-size: 10.5px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="brand-shell">
        <div class="brand-mark">26</div>

        <div class="brand">
          <h1>World Cup 2026 Dashboard</h1>
          <div class="header-meta">
            <span class="meta-pill">Live</span>

  <script>
    const GAMES_API_URL = "https://worldcup26.ir/get/games";
    const TEAMS_API_URL = "https://worldcup26.ir/get/teams";
    const GROUPS_API_URL = "https://worldcup26.ir/get/groups";
    const STADIUMS_API_URL = "https://worldcup26.ir/get/stadiums";
    const PROXY_URL = "https://api.allorigins.win/get?url=";

    const STAGE_NAMES = {
      GROUP: "Group Stage",
      R32: "Round of 32",
      R16: "Round of 16",
      QF: "Quarter-finals",
      SF: "Semi-finals",
      THIRD: "Third place play-off",
      FINAL: "Final",
      OTHER: "Match"
    };

    const STAGE_ORDER = [
      STAGE_NAMES.GROUP,
      STAGE_NAMES.R32,
      STAGE_NAMES.R16,
      STAGE_NAMES.QF,
      STAGE_NAMES.SF,
      STAGE_NAMES.THIRD,
      STAGE_NAMES.OTHER,
      STAGE_NAMES.FINAL
    ];

    const statusEl = document.getElementById("api-status");

    let gamesData = [];
    let groupsData = [];
    let standingsData = [];
    let teamsById = {};
    let teamsByName = {};
    let teamOrderById = {};
    let teamOrderByName = {};
    let stadiumsById = {};

    const FALLBACK_STADIUMS = {
      "1":  { id: "1",  name: "Estadio Azteca", city: "Mexico City", country: "Mexico", region: "Central", offsetToWIB: 13 },
      "2":  { id: "2",  name: "Estadio Akron", city: "Guadalajara", country: "Mexico", region: "Central", offsetToWIB: 13 },
      "3":  { id: "3",  name: "Estadio BBVA", city: "Monterrey", country: "Mexico", region: "Central", offsetToWIB: 13 },

      "4":  { id: "4",  name: "AT&T Stadium", city: "Dallas", country: "United States", region: "Central", offsetToWIB: 12 },
      "5":  { id: "5",  name: "NRG Stadium", city: "Houston", country: "United States", region: "Central", offsetToWIB: 12 },
      "6":  { id: "6",  name: "Arrowhead Stadium", city: "Kansas City", country: "United States", region: "Central", offsetToWIB: 12 },

      "7":  { id: "7",  name: "Mercedes-Benz Stadium", city: "Atlanta", country: "United States", region: "Eastern", offsetToWIB: 11 },
      "8":  { id: "8",  name: "Hard Rock Stadium", city: "Miami", country: "United States", region: "Eastern", offsetToWIB: 11 },
      "9":  { id: "9",  name: "Gillette Stadium", city: "Boston", country: "United States", region: "Eastern", offsetToWIB: 11 },
      "10": { id: "10", name: "Lincoln Financial Field", city: "Philadelphia", country: "United States", region: "Eastern", offsetToWIB: 11 },
      "11": { id: "11", name: "MetLife Stadium", city: "New York/New Jersey", country: "United States", region: "Eastern", offsetToWIB: 11 },
      "12": { id: "12", name: "BMO Field", city: "Toronto", country: "Canada", region: "Eastern", offsetToWIB: 11 },

      "13": { id: "13", name: "BC Place", city: "Vancouver", country: "Canada", region: "Western", offsetToWIB: 14 },
      "14": { id: "14", name: "Lumen Field", city: "Seattle", country: "United States", region: "Western", offsetToWIB: 14 },
      "15": { id: "15", name: "Levi's Stadium", city: "San Francisco Bay Area", country: "United States", region: "Western", offsetToWIB: 14 },
      "16": { id: "16", name: "SoFi Stadium", city: "Los Angeles", country: "United States", region: "Western", offsetToWIB: 14 }
    };

    function switchTab(tabName) {
      document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
      document.querySelectorAll(".view").forEach(view => view.classList.remove("active"));

      const tabIndex = {
        dashboard: 0,
        matches: 1,
        table: 2,
        venues: 3
      }[tabName];

      document.querySelectorAll(".tab-btn")[tabIndex].classList.add("active");
      document.getElementById(tabName).classList.add("active");
    }

    function showStatus(message, type = "info") {
      statusEl.classList.remove("hidden");
      statusEl.style.color = type === "error" ? "#dc2626" : "#6b7280";
      statusEl.textContent = message;
    }

    function hideStatus() {
      statusEl.classList.add("hidden");
      statusEl.textContent = "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeUrl(url) {
      if (!url) return "";
      const value = String(url).trim();

      if (value.startsWith("https://") || value.startsWith("http://")) return value;
      if (value.startsWith("//")) return "https:" + value;
      if (value.startsWith("/")) return "https://worldcup26.ir" + value;

      return value;
    }

    async function fetchJson(url) {
      try {
        const response = await fetch(url, { cache: "no-store" });
        const text = await response.text();

        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        return JSON.parse(text);
      } catch (directError) {
        const proxyResponse = await fetch(PROXY_URL + encodeURIComponent(url), { cache: "no-store" });
        const proxyJson = await proxyResponse.json();

        if (!proxyJson.contents) {
          throw new Error("Proxy returned empty response for " + url);
        }

        return JSON.parse(proxyJson.contents);
      }
    }

    function extractArray(json, key) {
      if (Array.isArray(json)) return json;
      if (Array.isArray(json?.[key])) return json[key];
      if (Array.isArray(json?.data)) return json.data;
      if (Array.isArray(json?.data?.[key])) return json.data[key];
      if (Array.isArray(json?.results)) return json.results;
      return [];
    }

    function toNumber(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : 0;
    }

    function normalizeDisplayName(name) {
      const map = {
        "United States": "USA",
        "Czech Republic": "Czechia",
        "Turkey": "Türkiye",
        "Turkiye": "Türkiye"
      };

      return map[name] || name;
    }

function normalizeGroup(value) {
  if (value === null || value === undefined) return "";

  let raw = value;
  if (Array.isArray(raw)) raw = raw[0];

  const s = String(raw).trim();
  if (!s) return "";

  const groupMatch = s.match(/\b(?:group|grp)[\s:_-]*([A-L])\b/i);
  if (groupMatch) return groupMatch[1].toUpperCase();

  const singleLetter = s.match(/^\s*([A-L])\s*$/i);
  if (singleLetter) return singleLetter[1].toUpperCase();

  const looseLetter = s.match(/\b([A-L])\b/i);
  if (looseLetter) return looseLetter[1].toUpperCase();

  return "";
}

    function displayGroup(group) {
      const g = normalizeGroup(group);
      return g ? `Group ${g}` : "Group";
    }

    function getStageCandidateText(game) {
      const candidates = [
        game.stage,
        game.stage_name,
        game.round,
        game.round_name,
        game.phase,
        game.phase_name,
        game.type,
        game.match_type,
        game.matchType,
        game.category,
        game.title,
        game.name
      ];

      return candidates
        .filter(v => v !== undefined && v !== null)
        .map(v => {
          if (typeof v === "object") {
            return [
              v.name,
              v.name_en,
              v.title,
              v.label,
              v.type,
              v.round,
              v.stage
            ].filter(Boolean).join(" ");
          }

          return String(v);
        })
        .join(" ")
        .trim();
    }

    function getMatchStage(game) {
      const explicitText = getStageCandidateText(game);
      const text = explicitText.toLowerCase();
      const compact = text.replace(/[^a-z0-9]/g, "");

      if (
        text.includes("third place") ||
        text.includes("third-place") ||
        text.includes("3rd place") ||
        text.includes("bronze") ||
        compact.includes("thirdplace") ||
        compact.includes("3rdplace")
      ) {
        return STAGE_NAMES.THIRD;
      }

      if (
        text.includes("semi") ||
        compact.includes("semifinal") ||
        compact.includes("semifinals")
      ) {
        return STAGE_NAMES.SF;
      }

      if (
        text.includes("quarter") ||
        compact.includes("quarterfinal") ||
        compact.includes("quarterfinals")
      ) {
        return STAGE_NAMES.QF;
      }

      if (
        text.includes("round of 32") ||
        text.includes("round-of-32") ||
        text.includes("last 32") ||
        text.includes("r32") ||
        text.includes("1/16") ||
        compact.includes("roundof32") ||
        compact.includes("round32") ||
        compact.includes("last32")
      ) {
        return STAGE_NAMES.R32;
      }

      if (
        text.includes("round of 16") ||
        text.includes("round-of-16") ||
        text.includes("last 16") ||
        text.includes("r16") ||
        text.includes("1/8") ||
        compact.includes("roundof16") ||
        compact.includes("round16") ||
        compact.includes("last16")
      ) {
        return STAGE_NAMES.R16;
      }

      if (
        text === "final" ||
        text.includes(" final") ||
        text.startsWith("final") ||
        compact === "final"
      ) {
        return STAGE_NAMES.FINAL;
      }

      if (
        text.includes("group") ||
        normalizeGroup(game.group || game.group_name || game.group_letter)
      ) {
        return STAGE_NAMES.GROUP;
      }

      return STAGE_NAMES.OTHER;
    }

    function getMatchCategoryLabel(game) {
      return getMatchStage(game);
    }

    function getSectionTitle(sectionGames, sectionDate) {
      const labels = [...new Set(sectionGames.map(getMatchCategoryLabel).filter(Boolean))];

      const prefix = labels.length === 1
        ? labels[0]
        : "Matches";

      return `${prefix} · ${getRelativeDateLabel(sectionDate)}`;
    }

    function buildTeamLookup(teams) {
      teamsById = {};
      teamsByName = {};
      teamOrderById = {};
      teamOrderByName = {};

      teams.forEach((team, index) => {
        const sortOrder = index + 1;
        team.__sort_order = sortOrder;

        const id = team.id ?? team._id ?? team.team_id;

        if (id !== undefined && id !== null) {
          teamsById[String(id)] = team;
          teamOrderById[String(id)] = sortOrder;
        }

        const names = [
          team.name_en,
          team.name,
          team.country,
          team.fifa_code
        ];

        names.forEach(name => {
          if (name) {
            const key = String(name).toLowerCase().trim();
            teamsByName[key] = team;
            teamOrderByName[key] = sortOrder;
          }
        });
      });
    }
    
  function getTeamJsonOrder(teamId, teamName) {
      const idKey = String(teamId ?? "");

      if (idKey && teamOrderById[idKey] !== undefined) {
        return teamOrderById[idKey];
      }

      const nameKey = String(teamName ?? "").toLowerCase().trim();

      if (nameKey && teamOrderByName[nameKey] !== undefined) {
        return teamOrderByName[nameKey];
      }

      return 9999;
    }
    
    function getTeamById(teamId) {
      const team = teamsById[String(teamId)] || {};

      const name =
        team.name_en ||
        team.name ||
        team.country ||
        (teamId ? `Team ${teamId}` : "-");

      const group =
        team.groups ||
        team.group ||
        team.group_name ||
        "";

      return {
        id: team.id ?? team._id ?? team.team_id ?? teamId,
        name: normalizeDisplayName(name),
        flag: normalizeUrl(team.flag || team.flag_url || team.logo || ""),
        group: normalizeGroup(group)
      };
    }

    function getTeam(game, side) {
      const teamId =
        game[`${side}_team_id`] ??
        game[`${side}_id`] ??
        game[`${side}TeamId`];

      const apiName =
        game[`${side}_team_name_en`] ||
        game[`${side}_team_name`] ||
        game[`${side}_team`] ||
        game[`${side}_name`] ||
        "";

      const team =
        teamsById[String(teamId)] ||
        teamsByName[String(apiName).toLowerCase()] ||
        {};

      const name =
        team.name_en ||
        team.name ||
        apiName ||
        (teamId ? `Team ${teamId}` : "-");

      const group =
        team.groups ||
        team.group ||
        team.group_name ||
        game.group ||
        "";

      return {
        id: team.id ?? team._id ?? team.team_id ?? teamId,
        name: normalizeDisplayName(name),
        flag: normalizeUrl(team.flag || team.flag_url || game[`${side}_flag`] || ""),
        group: normalizeGroup(group)
      };
    }

    function getOffsetToWIB(stadium) {
      if (stadium.offsetToWIB !== undefined) return stadium.offsetToWIB;

      const timezone = String(stadium.timezone || stadium.time_zone || "").toLowerCase();
      const region = String(stadium.region || "").toLowerCase();
      const country = String(stadium.country_en || stadium.country || "").toLowerCase();

      if (timezone.includes("new_york") || timezone.includes("toronto")) return 11;
      if (timezone.includes("chicago")) return 12;
      if (timezone.includes("mexico")) return 13;
      if (timezone.includes("los_angeles") || timezone.includes("vancouver")) return 14;

      if (region.includes("eastern")) return 11;

      if (region.includes("central")) {
        if (country.includes("mexico")) return 13;
        return 12;
      }

      if (region.includes("western") || region.includes("pacific")) return 14;

      return 11;
    }

    function buildStadiumLookup(stadiums) {
      stadiumsById = { ...FALLBACK_STADIUMS };

      stadiums.forEach(stadium => {
        const id = stadium.id ?? stadium._id ?? stadium.stadium_id;

        if (id === undefined || id === null) return;

        stadiumsById[String(id)] = {
          id: String(id),
          name: stadium.name_en || stadium.name || stadium.stadium_name || FALLBACK_STADIUMS[String(id)]?.name || "",
          city: stadium.city_en || stadium.city || FALLBACK_STADIUMS[String(id)]?.city || "",
          country: stadium.country_en || stadium.country || FALLBACK_STADIUMS[String(id)]?.country || "",
          region: stadium.region || FALLBACK_STADIUMS[String(id)]?.region || "",
          offsetToWIB: getOffsetToWIB(stadium)
        };
      });
    }

    function getStadium(game) {
      return stadiumsById[String(game.stadium_id)] || {
        id: "",
        name: "",
        city: "",
        country: "",
        region: "",
        offsetToWIB: 11
      };
    }

    function parseVenueLocalDate(raw) {
      if (!raw) return null;

      const value = String(raw).trim();

      let match = value.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{2})/);

      if (match) {
        return {
          month: Number(match[1]),
          day: Number(match[2]),
          year: Number(match[3]),
          hour: Number(match[4]),
          minute: Number(match[5])
        };
      }

      match = value.match(/^(\d{4})-(\d{1,2})-(\d{1,2})[T\s]+(\d{1,2}):(\d{2})/);

      if (match) {
        return {
          year: Number(match[1]),
          month: Number(match[2]),
          day: Number(match[3]),
          hour: Number(match[4]),
          minute: Number(match[5])
        };
      }

      const fallback = new Date(value);

      if (!isNaN(fallback.getTime())) {
        return {
          year: fallback.getFullYear(),
          month: fallback.getMonth() + 1,
          day: fallback.getDate(),
          hour: fallback.getHours(),
          minute: fallback.getMinutes()
        };
      }

      return null;
    }

    function getVenueDateRaw(game) {
      return (
        game.local_date ||
        game.date ||
        game.datetime ||
        game.match_date ||
        game.start_time ||
        game.kickoff_time ||
        ""
      );
    }

    function getWibDate(game) {
      const stadium = getStadium(game);
      const venue = parseVenueLocalDate(getVenueDateRaw(game));

      if (!venue) return null;

      return new Date(Date.UTC(
        venue.year,
        venue.month - 1,
        venue.day,
        venue.hour + stadium.offsetToWIB,
        venue.minute
      ));
    }

    function getTodayWibDate() {
      return new Date(Date.now() + 7 * 60 * 60 * 1000);
    }

    function dateKey(date) {
      if (!date) return "unknown";

      const y = date.getUTCFullYear();
      const m = String(date.getUTCMonth() + 1).padStart(2, "0");
      const d = String(date.getUTCDate()).padStart(2, "0");

      return `${y}-${m}-${d}`;
    }

    function startOfUtcDay(date) {
      return Date.UTC(
        date.getUTCFullYear(),
        date.getUTCMonth(),
        date.getUTCDate()
      );
    }

    function dayDiff(dateA, dateB) {
      return Math.round((startOfUtcDay(dateA) - startOfUtcDay(dateB)) / 86400000);
    }

    function getRelativeDateLabel(date) {
      if (!date) return "";

      const diff = dayDiff(date, getTodayWibDate());

      if (diff === -1) return "Yesterday";
      if (diff === 0) return "Today";
      if (diff === 1) return "Tomorrow";

      return date.toLocaleDateString("en-GB", {
        timeZone: "UTC",
        weekday: "short",
        day: "2-digit",
        month: "short"
      });
    }

    function formatWibTime(date) {
      if (!date) return "-";

      const hh = String(date.getUTCHours()).padStart(2, "0");
      const mm = String(date.getUTCMinutes()).padStart(2, "0");

      return `${hh}:${mm}`;
    }

    function formatWibDateTime(date) {
      if (!date) return "-";

      return `${getRelativeDateLabel(date)} · ${formatWibTime(date)} WIB`;
    }

    function formatVenueTime(game) {
      const venue = parseVenueLocalDate(getVenueDateRaw(game));

      if (!venue) return "";

      const hh = String(venue.hour).padStart(2, "0");
      const mm = String(venue.minute).padStart(2, "0");

      return `${hh}:${mm} local`;
    }

    function isFinished(game) {
      const finished = String(game.finished || "").toLowerCase();
      const status = String(game.status || "").toLowerCase();
      const elapsed = String(game.time_elapsed || "").toLowerCase();

      return (
        game.finished === true ||
        finished === "true" ||
        finished === "1" ||
        status === "ft" ||
        status === "finished" ||
        status === "fulltime" ||
        status === "full time" ||
        elapsed === "finished" ||
        elapsed === "ft"
      );
    }

    function isLive(game) {
      const status = String(game.status || "").toLowerCase();
      const elapsed = String(game.time_elapsed || "").toLowerCase();

      return (
        !isFinished(game) &&
        (
          status === "live" ||
          status === "in progress" ||
          (
            elapsed &&
            elapsed !== "notstarted" &&
            elapsed !== "not started" &&
            elapsed !== "scheduled" &&
            elapsed !== "null"
          )
        )
      );
    }

    function getScore(game, side) {
      const value =
        game[`${side}_score`] ??
        game[`${side}_goals`] ??
        "";

      return value === null || value === undefined || value === "" ? "" : value;
    }

    function parseRedCards(raw) {
      if (!raw || raw === "null" || raw === "{}") return [];

      if (Array.isArray(raw)) return raw;

      return String(raw)
        .replace(/[{}"“”]/g, "")
        .split(",")
        .map(x => x.trim())
        .filter(Boolean);
    }

    function getRedCards(game, side) {
      const raw =
        game[`${side}_red_cards`] ||
        game[`${side}_redcards`] ||
        game[`${side}_red_card`] ||
        "";

      return parseRedCards(raw);
    }

    function getRedCardCount(game) {
      return getRedCards(game, "home").length + getRedCards(game, "away").length;
    }

    function getGroupNameFromGame(game) {
      if (getMatchStage(game) !== STAGE_NAMES.GROUP) return "";

      const explicitGroup = normalizeGroup(
        game.group ||
        game.group_name ||
        game.group_letter
      );

      if (explicitGroup) return explicitGroup;

      const home = getTeam(game, "home");
      return normalizeGroup(home.group);
    }

    function getStageStats(games) {
      const map = {};

      games.forEach(game => {
        const stage = getMatchStage(game);

        if (!map[stage]) {
          map[stage] = {
            stage,
            total: 0,
            done: 0
          };
        }

        map[stage].total += 1;
        if (isFinished(game)) map[stage].done += 1;
      });

      return STAGE_ORDER
        .filter(stage => map[stage])
        .map(stage => map[stage]);
    }

    function getFinishedGoals(games) {
      return games.reduce((sum, game) => {
        const hs = toNumber(getScore(game, "home"));
        const as = toNumber(getScore(game, "away"));
        return sum + hs + as;
      }, 0);
    }

    function standingRowFromApi(row, groupName, sortOrder) {
      const teamId =
        row.team_id ??
        row.teamId ??
        row.id ??
        row.team?.id ??
        row.team?._id;

      const team = getTeamById(teamId);
      const rawTeam = teamsById[String(teamId)] || {};

      const name =
        team.name !== `Team ${teamId}` ? team.name :
        normalizeDisplayName(row.team_name_en || row.team_name || row.name_en || row.name || row.team?.name_en || row.team?.name || `Team ${teamId}`);

      const flag =
        team.flag ||
        normalizeUrl(row.flag || row.team?.flag || row.flag_url || "");

      const gf = toNumber(row.gf ?? row.goals_for);
      const ga = toNumber(row.ga ?? row.goals_against);
      const gd = row.gd !== undefined ? toNumber(row.gd) : gf - ga;
      const finalSortOrder = sortOrder ?? rawTeam.__sort_order ?? getTeamJsonOrder(teamId, name);

      return {
        team_id: String(teamId),
        group: groupName,
        name,
        flag,
        jsonOrder: finalSortOrder,
        sort_order: finalSortOrder,
        mp: toNumber(row.mp ?? row.played ?? row.matches_played),
        w: toNumber(row.w ?? row.win ?? row.wins),
        d: toNumber(row.d ?? row.draw ?? row.draws),
        l: toNumber(row.l ?? row.loss ?? row.losses),
        gf,
        ga,
        gd,
        pts: toNumber(row.pts ?? row.points)
      };
    }

    function emptyStandingRow(teamId, groupName, sortOrder) {
      const team = getTeamById(teamId);
      const rawTeam = teamsById[String(teamId)] || {};
      const finalSortOrder = sortOrder ?? rawTeam.__sort_order ?? getTeamJsonOrder(teamId, team.name);

      return {
        team_id: String(teamId),
        group: groupName,
        name: team.name,
        flag: team.flag,
        jsonOrder: finalSortOrder,
        sort_order: finalSortOrder,
        mp: 0,
        w: 0,
        d: 0,
        l: 0,
        gf: 0,
        ga: 0,
        gd: 0,
        pts: 0
      };
    }

    function buildStandings(groups, games) {
      const groupMap = {};

      groups.forEach(group => {
        const groupName = normalizeGroup(
          group.name ||
          group.group ||
          group.group_name ||
          group.letter ||
          group.id
        );

        if (!groupName) return;

        if (!groupMap[groupName]) {
          groupMap[groupName] = {
            name: groupName,
            rowsByTeamId: {}
          };
        }

        const rows =
          Array.isArray(group.teams) ? group.teams :
          Array.isArray(group.group_teams) ? group.group_teams :
          [];

        rows.forEach((row, index) => {
          const teamId =
            row.team_id ??
            row.teamId ??
            row.id ??
            row.team?.id ??
            row.team?._id;

          if (teamId === undefined || teamId === null) return;

          groupMap[groupName].rowsByTeamId[String(teamId)] =
            standingRowFromApi(row, groupName, index + 1);
        });
      });

      Object.values(teamsById).forEach(team => {
        const teamId = team.id ?? team._id ?? team.team_id;
        const groupName = normalizeGroup(team.groups || team.group || team.group_name);

        if (!teamId || !groupName) return;

        if (!groupMap[groupName]) {
          groupMap[groupName] = {
            name: groupName,
            rowsByTeamId: {}
          };
        }

        if (!groupMap[groupName].rowsByTeamId[String(teamId)]) {
          groupMap[groupName].rowsByTeamId[String(teamId)] =
            emptyStandingRow(teamId, groupName);
        }
      });

      const groupApiHasStats = Object.values(groupMap).some(group => {
        return Object.values(group.rowsByTeamId).some(row => {
          return row.mp || row.w || row.d || row.l || row.gf || row.ga || row.gd || row.pts;
        });
      });

      if (!groupApiHasStats) {
        Object.values(groupMap).forEach(group => {
          Object.values(group.rowsByTeamId).forEach(row => {
            row.mp = 0;
            row.w = 0;
            row.d = 0;
            row.l = 0;
            row.gf = 0;
            row.ga = 0;
            row.gd = 0;
            row.pts = 0;
          });
        });

        games
          .filter(game => getGroupNameFromGame(game) && isFinished(game))
          .forEach(game => {
            const groupName = getGroupNameFromGame(game);

            if (!groupMap[groupName]) {
              groupMap[groupName] = {
                name: groupName,
                rowsByTeamId: {}
              };
            }

            const homeId = String(getTeam(game, "home").id);
            const awayId = String(getTeam(game, "away").id);

            if (!groupMap[groupName].rowsByTeamId[homeId]) {
              groupMap[groupName].rowsByTeamId[homeId] = emptyStandingRow(homeId, groupName);
            }

            if (!groupMap[groupName].rowsByTeamId[awayId]) {
              groupMap[groupName].rowsByTeamId[awayId] = emptyStandingRow(awayId, groupName);
            }

            const home = groupMap[groupName].rowsByTeamId[homeId];
            const away = groupMap[groupName].rowsByTeamId[awayId];

            const homeScore = toNumber(getScore(game, "home"));
            const awayScore = toNumber(getScore(game, "away"));

            home.mp += 1;
            away.mp += 1;

            home.gf += homeScore;
            home.ga += awayScore;
            away.gf += awayScore;
            away.ga += homeScore;

            home.gd = home.gf - home.ga;
            away.gd = away.gf - away.ga;

            if (homeScore > awayScore) {
              home.w += 1;
              away.l += 1;
              home.pts += 3;
            } else if (homeScore < awayScore) {
              away.w += 1;
              home.l += 1;
              away.pts += 3;
            } else {
              home.d += 1;
              away.d += 1;
              home.pts += 1;
              away.pts += 1;
            }
          });
      }

      return Object.values(groupMap)
        .sort((a, b) => a.name.localeCompare(b.name))
        .map(group => {
          const rows = Object.values(group.rowsByTeamId)
            .filter(row => row.team_id && row.name && row.name !== "-");

          const groupHasPlayed = rows.some(row => {
            return (
              row.mp > 0 ||
              row.w > 0 ||
              row.d > 0 ||
              row.l > 0 ||
              row.gf > 0 ||
              row.ga > 0 ||
              row.pts > 0
            );
          });

          rows.sort((a, b) => {
            if (!groupHasPlayed) {
              return (
                (a.sort_order || a.jsonOrder || 9999) - (b.sort_order || b.jsonOrder || 9999) ||
                a.name.localeCompare(b.name)
              );
            }

            return (
              b.pts - a.pts ||
              b.gd - a.gd ||
              b.gf - a.gf ||
              (a.sort_order || a.jsonOrder || 9999) - (b.sort_order || b.jsonOrder || 9999) ||
              a.name.localeCompare(b.name)
            );
          });

          return {
            name: group.name,
            rows
          };
        })
        .filter(group => group.rows.length);
    }

    function renderKpis() {
      const total = gamesData.length;
      const completed = gamesData.filter(isFinished).length;
      const live = gamesData.filter(isLive).length;
      const todayKey = dateKey(getTodayWibDate());

      const todayMatches = gamesData.filter(game => {
        const d = getWibDate(game);
        return d && dateKey(d) === todayKey;
      }).length;

      const now = getTodayWibDate();

      const upcoming24 = gamesData.filter(game => {
        const d = getWibDate(game);
        if (!d || isFinished(game)) return false;

        const diff = d.getTime() - now.getTime();
        return diff >= 0 && diff <= 24 * 60 * 60 * 1000;
      }).length;

      const goals = getFinishedGoals(gamesData);
      const redCards = gamesData.reduce((sum, game) => sum + getRedCardCount(game), 0);
      const progress = total ? Math.round((completed / total) * 100) : 0;

      const kpis = [
        ["Total Matches", total, "Tournament scope"],
        ["Completed", completed, `${progress}% overall progress`],
        ["Live", live, "Currently in progress"],
        ["Today", todayMatches, "WIB calendar day"],
        ["Upcoming 24H", upcoming24, "Next-day lookahead"],
        ["Goals", goals, `${redCards} red cards`]
      ];

      document.getElementById("kpi-grid").innerHTML = kpis.map(k => `
        <div class="kpi-card">
          <div class="kpi-label">${escapeHtml(k[0])}</div>
          <div class="kpi-value">${escapeHtml(k[1])}</div>
          <div class="kpi-note">${escapeHtml(k[2])}</div>
        </div>
      `).join("");
    }

function renderProgress() {
  const stats = getStageStats(gamesData);

  if (!stats.length) {
    document.getElementById("progress-container").innerHTML = `<div class="empty-state">No stage data available.</div>`;
    return;
  }

  document.getElementById("progress-container").innerHTML = stats.map(row => {
    const pct = row.total ? Math.round((row.done / row.total) * 100) : 0;

    return `
      <div class="progress-row">
        <div class="progress-name">
          <div>${escapeHtml(row.stage)}</div>
          <div class="progress-count">${row.done} / ${row.total} matches</div>
        </div>

        <div class="progress-track">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>

        <div class="progress-percent">${pct}%</div>
      </div>
    `;
  }).join("");
}

function renderGroupHealth() {
  if (!standingsData.length) {
    document.getElementById("risk-list").innerHTML = `<div class="empty-state">No group data available.</div>`;
    return;
  }

  const groups = standingsData
    .map(group => {
      const groupGames = gamesData.filter(game => getGroupNameFromGame(game) === group.name);

      const total = groupGames.length || (
        group.rows.length > 1
          ? group.rows.length * (group.rows.length - 1) / 2
          : group.rows.length
      );

      const actual = groupGames.filter(isFinished).length;
      const pct = total ? Math.round((actual / total) * 100) : 0;

      return {
        name: group.name,
        title: displayGroup(group.name),
        actual,
        total,
        pct
      };
    })
    .sort((a, b) => a.name.localeCompare(b.name));

  const leftGroups = groups.filter(group => group.name >= "A" && group.name <= "F");
  const rightGroups = groups.filter(group => group.name >= "G" && group.name <= "L");

  function renderHealthColumn(items) {
    return items.map(group => `
      <div class="health-item">
        <div class="health-row">
          <div class="health-title">${escapeHtml(group.title)}</div>
          <div class="health-count">${group.actual}/${group.total} matches</div>
        </div>

        <div class="health-progress">
          <div class="health-progress-fill" style="width:${group.pct}%"></div>
        </div>
      </div>
    `).join("");
  }

  document.getElementById("risk-list").innerHTML = `
    <div class="group-health-grid">
      <div class="group-health-column">
        ${renderHealthColumn(leftGroups)}
      </div>

      <div class="group-health-column">
        ${renderHealthColumn(rightGroups)}
      </div>
    </div>
  `;
}

    function getMatchTitle(game) {
      const home = getTeam(game, "home").name;
      const away = getTeam(game, "away").name;
      return `${home} vs ${away}`;
    }

    function getMatchPriorityInfo(game, rankMap) {
      const stage = getMatchStage(game);
      const group = getGroupNameFromGame(game);
      const home = getTeam(game, "home");
      const away = getTeam(game, "away");

      const h = rankMap[group]?.[String(home.id)] || {};
      const a = rankMap[group]?.[String(away.id)] || {};

      let priority = 1;
      let label = "Watch";
      let color = "gray";
      let reason = "Upcoming match in tournament schedule.";

      if (stage === STAGE_NAMES.FINAL) {
        priority = 5;
        label = "Final Match";
        color = "red";
        reason = "Tournament final match.";
      } else if (stage === STAGE_NAMES.SF) {
        priority = 5;
        label = "Semi-finals";
        color = "red";
        reason = "Semi-finals match with direct qualification impact.";
      } else if (stage === STAGE_NAMES.THIRD) {
        priority = 4;
        label = "Third place play-off";
        color = "yellow";
        reason = "Knockout-stage placement match.";
      } else if (stage === STAGE_NAMES.QF || stage === STAGE_NAMES.R16 || stage === STAGE_NAMES.R32) {
        priority = 4;
        label = stage;
        color = "yellow";
        reason = "Knockout-stage match.";
      } else if (h.rank <= 2 && a.rank <= 2) {
        priority = 5;
        label = "High Impact";
        color = "red";
        reason = "Rank 1 vs Rank 2 within the group.";
      } else if (Math.abs((h.pts || 0) - (a.pts || 0)) <= 1 && ((h.mp || 0) > 0 || (a.mp || 0) > 0)) {
        priority = 4;
        label = "Tight Group";
        color = "yellow";
        reason = "Small points gap between both teams.";
      } else if ((h.rank <= 2 && (a.pts || 0) === 0) || (a.rank <= 2 && (h.pts || 0) === 0)) {
        priority = 3;
        label = "Recovery Watch";
        color = "yellow";
        reason = "One team still has 0 points against a top-ranked team.";
      }

      return {
        priority,
        label,
        color,
        reason
      };
    }

    function renderLookaheadMatches() {
      const rankMap = getRankMap();
      const now = getTodayWibDate();

      const upcoming = gamesData
        .filter(game => {
          const d = getWibDate(game);
          return d && !isFinished(game) && d.getTime() >= now.getTime();
        })
        .map(game => {
          return {
            game,
            date: getWibDate(game),
            priorityInfo: getMatchPriorityInfo(game, rankMap)
          };
        })
        .sort((a, b) => {
          return a.date - b.date || b.priorityInfo.priority - a.priorityInfo.priority;
        })
        .slice(0, 12);

      if (!upcoming.length) {
        document.getElementById("lookahead-list").innerHTML = `<div class="empty-state">No upcoming matches found.</div>`;
        return;
      }

      document.getElementById("lookahead-list").innerHTML = upcoming.map(item => {
        const game = item.game;
        const d = item.date;
        const stadium = getStadium(game);
        const priority = item.priorityInfo;

        return `
          <div class="mini-card lookahead-match-card">
            <div class="mini-card-title lookahead-title-row">
              <span class="lookahead-match-title">${escapeHtml(getMatchTitle(game))}</span>

              <div class="lookahead-top-right">
                <span class="match-date-pill">${escapeHtml(formatWibDateTime(d))}</span>
                <span class="badge ${priority.color}">${escapeHtml(priority.label)}</span>
              </div>
            </div>

            <div class="mini-card-sub">
              ${escapeHtml(getMatchBoxLabel(game))}<br>
              ${escapeHtml(stadium.city || stadium.name || "")}${stadium.city || stadium.name ? " · " : ""}${escapeHtml(formatVenueTime(game))}
              <div class="priority-line">${escapeHtml(priority.reason)}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    function getRankMap() {
      const map = {};

      standingsData.forEach(group => {
        map[group.name] = {};

        group.rows.forEach((row, index) => {
          map[group.name][String(row.team_id)] = {
            rank: index + 1,
            pts: row.pts,
            gd: row.gd,
            mp: row.mp,
            name: row.name
          };
        });
      });

      return map;
    }

    function renderCriticalMatches() {
      renderLookaheadMatches();
    }

    function renderMatches() {
      if (!gamesData.length) {
        document.getElementById("matches-container").innerHTML = `<div class="empty-state">No matches found.</div>`;
        return;
      }

      const sorted = [...gamesData].sort((a, b) => {
        const da = getWibDate(a);
        const db = getWibDate(b);
        return (da?.getTime() || 0) - (db?.getTime() || 0);
      });

      const grouped = sorted.reduce((acc, game) => {
        const d = getWibDate(game);
        const key = dateKey(d);

        if (!acc[key]) {
          acc[key] = {
            date: d,
            games: []
          };
        }

        acc[key].games.push(game);
        return acc;
      }, {});

      document.getElementById("matches-container").innerHTML = Object.values(grouped).map(section => {
        return `
          <div class="day-header">${escapeHtml(getSectionTitle(section.games, section.date))}</div>
          <div class="match-grid">
            ${section.games.map(game => {
              const home = getTeam(game, "home");
              const away = getTeam(game, "away");
              const d = getWibDate(game);
              const stadium = getStadium(game);
              const statusText = isLive(game) ? "LIVE" : isFinished(game) ? "FT" : "Kick-off";
              const statusColor = isLive(game) ? "red" : isFinished(game) ? "gray" : "blue";

              return `
                <div class="match-card">
                  <div>
                    <div class="group-label">${escapeHtml(getMatchBoxLabel(game))}</div>

                    <div class="team-row">
                      <img class="flag" src="${escapeHtml(home.flag)}" alt="" onerror="this.style.visibility='hidden'">
                      <div class="team-name">
                        ${escapeHtml(home.name)}
                        ${getRedCards(game, "home").length ? `<span class="red-card"></span>` : ""}
                      </div>
                      <div class="score">${escapeHtml(getScore(game, "home"))}</div>
                    </div>

                    <div class="team-row">
                      <img class="flag" src="${escapeHtml(away.flag)}" alt="" onerror="this.style.visibility='hidden'">
                      <div class="team-name">
                        ${escapeHtml(away.name)}
                        ${getRedCards(game, "away").length ? `<span class="red-card"></span>` : ""}
                      </div>
                      <div class="score">${escapeHtml(getScore(game, "away"))}</div>
                    </div>
                  </div>

                  <div class="time-panel">
                    <span class="badge ${statusColor}">${escapeHtml(statusText)}</span>
                    <div class="time-main">${escapeHtml(isLive(game) ? (game.time_elapsed || formatWibTime(d)) : formatWibTime(d))}</div>
                    <div class="time-note">
                      WIB<br>
                      ${escapeHtml(stadium.city || stadium.name || "")}<br>
                      ${escapeHtml(formatVenueTime(game))}
                    </div>
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        `;
      }).join("");
    }

    function renderTables() {
      if (!standingsData.length) {
        document.getElementById("table-container").innerHTML = `<div class="empty-state">No group table data found.</div>`;
        return;
      }

      document.getElementById("table-container").innerHTML = standingsData.map(group => {
        return `
          <section class="standings-block">
            <h2 class="standings-title">${escapeHtml(displayGroup(group.name))}</h2>

            <table class="standings-table">
              <colgroup>
                <col class="rank-col">
                <col class="team-col">
                <col class="stat-col">
                <col class="stat-col">
                <col class="stat-col">
                <col class="stat-col">
                <col class="stat-col">
                <col class="stat-col">
                <col class="stat-col">
                <col class="stat-col">
              </colgroup>

              <thead>
                <tr>
                  <th></th>
                  <th style="text-align:left;">Team</th>
                  <th>MP</th>
                  <th>W</th>
                  <th>D</th>
                  <th>L</th>
                  <th>GF</th>
                  <th>GA</th>
                  <th>GD</th>
                  <th>Pts</th>
                </tr>
              </thead>

              <tbody>
                ${group.rows.map((row, index) => `
                  <tr>
                    <td>${index + 1}</td>
                    <td>
                      <div class="team-cell">
                        <img src="${escapeHtml(row.flag)}" alt="" onerror="this.style.visibility='hidden'">
                        <span>${escapeHtml(row.name)}</span>
                      </div>
                    </td>
                    <td>${row.mp}</td>
                    <td>${row.w}</td>
                    <td>${row.d}</td>
                    <td>${row.l}</td>
                    <td>${row.gf}</td>
                    <td>${row.ga}</td>
                    <td>${row.gd}</td>
                    <td class="pts">${row.pts}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </section>
        `;
      }).join("");
    }

    function renderVenues() {
      const venueMap = {};

      gamesData.forEach(game => {
        const stadium = getStadium(game);
        const id = String(game.stadium_id || stadium.id || stadium.name || "unknown");

        if (!venueMap[id]) {
          venueMap[id] = {
            id,
            name: stadium.name || "Unknown Stadium",
            city: stadium.city || "",
            country: stadium.country || "",
            total: 0,
            done: 0,
            nextGame: null
          };
        }

        venueMap[id].total += 1;

        if (isFinished(game)) {
          venueMap[id].done += 1;
        }

        if (!isFinished(game)) {
          const d = getWibDate(game);

          if (d && (!venueMap[id].nextGame || d < getWibDate(venueMap[id].nextGame))) {
            venueMap[id].nextGame = game;
          }
        }
      });

      const venues = Object.values(venueMap)
        .filter(v => v.total)
        .sort((a, b) => b.total - a.total || a.name.localeCompare(b.name));

      if (!venues.length) {
        document.getElementById("venue-container").innerHTML = `<div class="empty-state">No venue data found.</div>`;
        return;
      }

      document.getElementById("venue-container").innerHTML = venues.map(v => {
        const pct = v.total ? Math.round((v.done / v.total) * 100) : 0;
        const next = v.nextGame ? getMatchTitle(v.nextGame) : "No upcoming match";
        const nextDate = v.nextGame ? formatWibDateTime(getWibDate(v.nextGame)) : "";

        return `
          <div class="venue-card">
            <div class="venue-head">
              <div>
                <div class="venue-name">${escapeHtml(v.name)}</div>
                <div class="venue-city">${escapeHtml([v.city, v.country].filter(Boolean).join(", "))}</div>
              </div>
              <span class="badge blue">${v.done}/${v.total}</span>
            </div>

            <div class="bar-label">
              <span>Utilization Progress</span>
              <span>${pct}%</span>
            </div>

            <div class="bar-track">
              <div class="bar-fill" style="width:${pct}%"></div>
            </div>

            <div class="mini-card-sub" style="margin-top:10px;">
              Next match: ${escapeHtml(next)}${nextDate ? `<br>${escapeHtml(nextDate)}` : ""}
            </div>
          </div>
        `;
      }).join("");
    }

    function renderAll() {
      renderKpis();
      renderProgress();
      renderGroupHealth();
      renderLookaheadMatches();
      renderMatches();
      renderTables();
      renderVenues();
    }

function getMatchBoxLabel(game) {
  const stage = getMatchCategoryLabel(game);
  const group = getGroupNameFromGame(game);

  if (stage === STAGE_NAMES.GROUP && group) {
    return `${stage} · Group ${group}`;
  }

  return stage;
}
    async function fetchData() {
      showStatus("Loading data...");

      try {
        const gamesJson = await fetchJson(GAMES_API_URL);
        gamesData = extractArray(gamesJson, "games");

        const [teamsResult, groupsResult, stadiumsResult] = await Promise.allSettled([
          fetchJson(TEAMS_API_URL),
          fetchJson(GROUPS_API_URL),
          fetchJson(STADIUMS_API_URL)
        ]);

        const teamsArray = teamsResult.status === "fulfilled"
          ? extractArray(teamsResult.value, "teams")
          : [];

        groupsData = groupsResult.status === "fulfilled"
          ? extractArray(groupsResult.value, "groups")
          : [];

        const stadiumsArray = stadiumsResult.status === "fulfilled"
          ? extractArray(stadiumsResult.value, "stadiums")
          : [];

        buildTeamLookup(teamsArray);
        buildStadiumLookup(stadiumsArray);

        standingsData = buildStandings(groupsData, gamesData);

        renderAll();
        hideStatus();

      } catch (error) {
        console.error(error);
        showStatus("Failed to load data. Please check API connection or CORS proxy.", "error");

        document.getElementById("kpi-grid").innerHTML = "";
        document.getElementById("progress-container").innerHTML = `<div class="empty-state">Data tidak bisa dimuat.</div>`;
        document.getElementById("risk-list").innerHTML = "";
        document.getElementById("lookahead-list").innerHTML = "";
        document.getElementById("matches-container").innerHTML = `<div class="empty-state">Matches data tidak bisa dimuat.</div>`;
        document.getElementById("table-container").innerHTML = `<div class="empty-state">Table data tidak bisa dimuat.</div>`;
        document.getElementById("venue-container").innerHTML = `<div class="empty-state">Venue data tidak bisa dimuat.</div>`;
      }
    }

function updateStickyTabPosition() {
  const topbar = document.querySelector(".topbar");
  if (!topbar) return;

  document.documentElement.style.setProperty(
    "--topbar-height",
    topbar.offsetHeight + "px"
  );
}

window.addEventListener("resize", updateStickyTabPosition);

window.onload = function () {
  updateStickyTabPosition();
  fetchData();
};
  </script>
