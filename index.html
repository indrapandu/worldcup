<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600">
    <title>FIFA World Cup 2026 Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Modern Minimalist Aesthetic */
        @font-face {
            font-family: 'Aptos';
            src: local('Aptos'), local('Segoe UI'), local('Helvetica Neue'), sans-serif;
        }
        body {
            font-family: 'Aptos', sans-serif;
            background-color: #ffffff;
            color: #0f172a;
        }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: #fafafa; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .accent-beige { background-color: #fcfbf9; }
        .border-beige { border-color: #f3f0e8; }
    </style>
</head>
<body class="antialiased">

    <header class="bg-slate-900 text-white shadow-sm sticky top-0 z-20">
        <div class="max-w-6xl mx-auto px-4 py-5 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                <h1 class="text-xl sm:text-2xl font-bold tracking-tight">World Cup 2026</h1>
            </div>
            <div id="sync-status" class="flex items-center gap-2 text-sm bg-slate-800 px-3 py-1.5 rounded-full border border-slate-700">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-yellow-500"></span>
                </span>
                <span class="font-medium text-slate-200">Connecting to APIs...</span>
            </div>
        </div>
        
        <nav class="max-w-6xl mx-auto px-4 flex overflow-x-auto no-scrollbar border-t border-slate-800">
            <button onclick="switchTab('matches')" id="tab-matches" class="tab-btn active px-5 py-3 text-sm font-semibold border-b-4 border-white text-white whitespace-nowrap transition-colors">Matches</button>
            <button onclick="switchTab('groups')" id="tab-groups" class="tab-btn px-5 py-3 text-sm font-semibold border-b-4 border-transparent text-slate-400 hover:text-white whitespace-nowrap transition-colors">Groups</button>
            <button onclick="switchTab('teams')" id="tab-teams" class="tab-btn px-5 py-3 text-sm font-semibold border-b-4 border-transparent text-slate-400 hover:text-white whitespace-nowrap transition-colors">Teams</button>
            <button onclick="switchTab('stadiums')" id="tab-stadiums" class="tab-btn px-5 py-3 text-sm font-semibold border-b-4 border-transparent text-slate-400 hover:text-white whitespace-nowrap transition-colors">Stadiums</button>
        </nav>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <div id="matches" class="tab-content block fade-in">
            <h2 class="text-xl font-bold text-slate-900 mb-6 border-b pb-2">Tournament Fixtures & Results</h2>
            <div id="matches-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="col-span-full text-center text-slate-500 py-10 animate-pulse">Fetching match data...</div>
            </div>
        </div>

        <div id="groups" class="tab-content hidden fade-in">
            <h2 class="text-xl font-bold text-slate-900 mb-6 border-b pb-2">Group Stage Standings</h2>
            <div id="groups-container" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="col-span-full text-center text-slate-500 py-10 animate-pulse">Fetching standings data...</div>
            </div>
        </div>

        <div id="teams" class="tab-content hidden fade-in">
            <h2 class="text-xl font-bold text-slate-900 mb-6 border-b pb-2">Qualified Nations (48 Teams)</h2>
            <div id="teams-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
                <div class="col-span-full text-center text-slate-500 py-10 animate-pulse">Fetching teams data...</div>
            </div>
        </div>

        <div id="stadiums" class="tab-content hidden fade-in">
            <h2 class="text-xl font-bold text-slate-900 mb-6 border-b pb-2">Host Stadiums</h2>
            <div id="stadiums-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="col-span-full text-center text-slate-500 py-10 animate-pulse">Fetching stadiums data...</div>
            </div>
        </div>

    </main>

    <script>
        // --- CONSTANTS ---
        const API_MATCHES = 'https://worldcup26.ir/get/games';
        const API_GROUPS = 'https://worldcup26.ir/get/groups';
        const API_TEAMS = 'https://worldcup26.ir/get/teams';
        const API_STADIUMS = 'https://worldcup26.ir/get/stadiums';

        // --- NAVIGATION LOGIC ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.add('hidden');
                el.classList.remove('block');
            });
            document.getElementById(tabId).classList.remove('hidden');
            document.getElementById(tabId).classList.add('block');

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('border-white', 'text-white', 'active');
                btn.classList.add('border-transparent', 'text-slate-400');
            });
            
            const activeBtn = document.getElementById(`tab-${tabId}`);
            activeBtn.classList.remove('border-transparent', 'text-slate-400');
            activeBtn.classList.add('border-white', 'text-white', 'active');
        }

        // --- RENDERING LOGIC ---
        function renderMatches(data) {
            const container = document.getElementById('matches-container');
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="col-span-full text-slate-500">No match data available.</div>';
                return;
            }

            container.innerHTML = data.map(match => {
                const homeTeam = match.homeTeam?.name || match.home_team || match.home || 'TBD';
                const awayTeam = match.awayTeam?.name || match.away_team || match.away || 'TBD';
                const homeScore = match.score?.home ?? match.home_score ?? match.homeResult ?? '-';
                const awayScore = match.score?.away ?? match.away_score ?? match.awayResult ?? '-';
                const status = match.status || 'Scheduled';
                const group = match.group || match.stage || 'Match';
                
                let matchDate = match.date || match.utcDate || match.datetime || '';
                if (matchDate) {
                    const d = new Date(matchDate);
                    matchDate = isNaN(d) ? matchDate : `${d.toLocaleDateString()} · ${d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                }

                const isFinished = status.toLowerCase().includes('finished') || status.toLowerCase() === 'ft' || homeScore !== '-';
                const statusHtml = isFinished 
                    ? `<span class="bg-slate-100 text-slate-700 text-[10px] px-2 py-1 rounded font-bold tracking-wide uppercase border border-slate-200">${status}</span>`
                    : `<span class="text-blue-700 font-bold text-[10px] tracking-wide uppercase">Upcoming</span>`;

                return `
                    <div class="accent-beige rounded-xl p-5 border border-beige flex flex-col h-full">
                        <div class="flex justify-between items-center mb-5">
                            <div class="text-xs font-bold text-slate-400 uppercase tracking-widest">${group}</div>
                            ${statusHtml}
                        </div>
                        <div class="flex-grow space-y-3">
                            <div class="flex justify-between items-center">
                                <span class="font-semibold text-slate-800">${homeTeam}</span>
                                <span class="font-bold text-lg ${isFinished ? 'text-slate-900' : 'text-slate-300'}">${homeScore}</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="font-semibold text-slate-800">${awayTeam}</span>
                                <span class="font-bold text-lg ${isFinished ? 'text-slate-900' : 'text-slate-300'}">${awayScore}</span>
                            </div>
                        </div>
                        <div class="mt-5 pt-4 border-t border-slate-200/60 text-xs text-slate-500 font-medium tracking-wide">
                            ${matchDate}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderGroups(data) {
            const container = document.getElementById('groups-container');
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="col-span-full text-slate-500">No standings data available.</div>';
                return;
            }

            container.innerHTML = data.map(group => {
                const groupName = group.name || group.group || "Group";
                const teams = group.teams || group.standings || [];

                return `
                <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
                    <div class="bg-slate-900 text-white px-5 py-3 font-bold text-sm tracking-wide uppercase">${groupName}</div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm whitespace-nowrap">
                            <thead class="accent-beige text-slate-500 border-b border-beige">
                                <tr>
                                    <th class="px-5 py-3 font-semibold">Team</th>
                                    <th class="px-3 py-3 font-semibold text-center">MP</th>
                                    <th class="px-3 py-3 font-semibold text-center">W</th>
                                    <th class="px-3 py-3 font-semibold text-center">D</th>
                                    <th class="px-3 py-3 font-semibold text-center">L</th>
                                    <th class="px-3 py-3 font-semibold text-center">GD</th>
                                    <th class="px-5 py-3 font-bold text-slate-900 text-center">Pts</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                ${teams.map((team, idx) => `
                                    <tr class="hover:bg-slate-50">
                                        <td class="px-5 py-3 font-semibold text-slate-800">${team.name || team.team?.name || 'TBD'}</td>
                                        <td class="px-3 py-3 text-center text-slate-500">${team.mp ?? team.playedGames ?? 0}</td>
                                        <td class="px-3 py-3 text-center text-slate-500">${team.w ?? team.won ?? 0}</td>
                                        <td class="px-3 py-3 text-center text-slate-500">${team.d ?? team.draw ?? 0}</td>
                                        <td class="px-3 py-3 text-center text-slate-500">${team.l ?? team.lost ?? 0}</td>
                                        <td class="px-3 py-3 text-center text-slate-500">${team.gd ?? team.goalDifference ?? 0}</td>
                                        <td class="px-5 py-3 text-center font-bold text-slate-900">${team.pts ?? team.points ?? 0}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
                `;
            }).join('');
        }

        function renderTeams(data) {
            const container = document.getElementById('teams-container');
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="col-span-full text-slate-500">No teams data available.</div>';
                return;
            }

            container.innerHTML = data.map(team => {
                const name = team.name || team.country || 'Unknown';
                const code = team.code || team.iso || '';
                return `
                    <div class="bg-white border border-slate-200 rounded-lg p-4 flex flex-col items-center justify-center text-center hover:border-slate-400 transition-colors">
                        <div class="font-bold text-slate-800 text-sm">${name}</div>
                        ${code ? `<div class="text-[10px] font-bold text-slate-400 mt-1 tracking-widest">${code}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        function renderStadiums(data) {
            const container = document.getElementById('stadiums-container');
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="col-span-full text-slate-500">No stadiums data available.</div>';
                return;
            }

            container.innerHTML = data.map(stadium => {
                const name = stadium.name || 'Stadium';
                const city = stadium.city || stadium.location || 'Unknown City';
                const capacity = stadium.capacity ? stadium.capacity.toLocaleString() : 'N/A';
                return `
                    <div class="accent-beige border border-beige rounded-xl p-5 flex flex-col justify-between">
                        <div>
                            <h3 class="font-bold text-slate-900 text-base leading-tight mb-1">${name}</h3>
                            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">${city}</p>
                        </div>
                        <div class="mt-4 pt-3 border-t border-slate-200/60">
                            <span class="text-xs text-slate-400">Capacity:</span>
                            <span class="text-sm font-bold text-slate-700 ml-1">${capacity}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- FETCH DATA MANAGER ---
        function updateStatusUI(status, errorMsg = "") {
            const syncDot = document.querySelector('.animate-ping');
            const syncDotBase = document.querySelector('.relative.inline-flex.rounded-full.h-2.w-2:not(.animate-ping)');
            const syncText = document.querySelector('.font-medium.text-slate-200');
            
            if (status === 'success') {
                if(syncDot) syncDot.className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75";
                if(syncDotBase) syncDotBase.className = "relative inline-flex rounded-full h-2 w-2 bg-green-500";
                if(syncText) syncText.innerText = "Data Synced";
            } else if (status === 'error') {
                if(syncDot) syncDot.className = "hidden"; 
                if(syncDotBase) syncDotBase.className = "relative inline-flex rounded-full h-2 w-2 bg-red-500";
                if(syncText) syncText.innerText = "Connection Error";
            }
        }

        async function safeFetch(url, renderFunction, containerId) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const json = await response.json();
                const payload = json.data || json.response || json || [];
                renderFunction(payload);
                return true;
            } catch (error) {
                console.error(`Error fetching from ${url}:`, error);
                document.getElementById(containerId).innerHTML = `<div class="col-span-full text-red-500 text-sm">Failed to load data from endpoint.</div>`;
                return false;
            }
        }

        async function fetchAllWorldCupData() {
            // Run all 4 fetches concurrently
            const results = await Promise.allSettled([
                safeFetch(API_MATCHES, renderMatches, 'matches-container'),
                safeFetch(API_GROUPS, renderGroups, 'groups-container'),
                safeFetch(API_TEAMS, renderTeams, 'teams-container'),
                safeFetch(API_STADIUMS, renderStadiums, 'stadiums-container')
            ]);

            // Check if any fetches succeeded to update the top right status indicator
            const anySuccess = results.some(result => result.value === true);
            updateStatusUI(anySuccess ? 'success' : 'error');
        }

        // Initialize App on Load
        window.onload = fetchAllWorldCupData;
    </script>
</body>
</html>
