<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #202124;
    }

    .page {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      background: #fff;
      border-left: 1px solid #d9d9d9;
      border-right: 1px solid #d9d9d9;
      min-height: 100vh;
    }

    .topbar {
      padding: 12px 28px;
      border-bottom: 1px solid #d9d9d9;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
    }

    .topbar h1 {
      font-size: 17px;
      font-weight: 500;
      margin: 0;
    }

    .refresh-btn {
      border: 1px solid #d0d7de;
      background: #f6f8fa;
      color: #24292f;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .refresh-btn:hover {
      background: #eef1f4;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid #d9d9d9;
      background: #fff;
      padding: 0 28px;
    }

    .tab-btn {
      border: none;
      background: transparent;
      padding: 13px 18px 12px;
      font-size: 14px;
      color: #5f6368;
      cursor: pointer;
      border-bottom: 3px solid transparent;
    }

    .tab-btn.active {
      color: #202124;
      font-weight: 600;
      border-bottom-color: #202124;
    }

    .tab-view {
      display: none;
    }

    .tab-view.active {
      display: block;
    }

    .status-line {
      padding: 10px 28px;
      border-bottom: 1px solid #e0e0e0;
      font-size: 12px;
      color: #666;
      background: #fafafa;
    }

    .status-line.hidden {
      display: none;
    }

    .day-header {
      padding: 14px 28px;
      background: #f8f9fa;
      border-top: 1px solid #d9d9d9;
      border-bottom: 1px solid #d9d9d9;
      font-size: 16px;
      font-weight: 400;
      color: #202124;
    }

    .match-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .match-card {
      min-height: 174px;
      padding: 22px 20px 22px 29px;
      border-bottom: 1px solid #d9d9d9;
      display: grid;
      grid-template-columns: 1fr 128px;
      column-gap: 18px;
      background: #fff;
    }

    .match-card:nth-child(odd) {
      border-right: 1px solid #d9d9d9;
    }

    .group-label {
      font-size: 14px;
      color: #6b6b6b;
      margin-bottom: 24px;
    }

    .team-row {
      display: grid;
      grid-template-columns: 36px 1fr 28px;
      align-items: center;
      min-height: 38px;
      gap: 12px;
    }

    .flag {
      width: 24px;
      height: 18px;
      object-fit: cover;
      border-radius: 1px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.08);
    }

    .team-name {
      font-size: 16px;
      color: #202124;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .score {
      font-size: 16px;
      color: #202124;
      text-align: right;
    }

    .right-panel {
      border-left: 2px solid #d0d0d0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding-left: 18px;
      min-width: 120px;
    }

    .status-text {
      font-size: 14px;
      color: #202124;
      line-height: 1.25;
      margin-bottom: 5px;
    }

    .date-text {
      font-size: 14px;
      color: #666;
      line-height: 1.25;
      margin-bottom: 8px;
    }

    .time-box {
      min-width: 86px;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      padding: 7px 8px;
      background: #fafafa;
      margin-bottom: 6px;
    }

    .time-label {
      font-size: 11px;
      color: #777;
      margin-bottom: 2px;
    }

    .time-value {
      font-size: 17px;
      font-weight: 600;
      color: #202124;
      letter-spacing: 0.2px;
    }

    .small-note {
      font-size: 10px;
      color: #777;
      line-height: 1.25;
      max-width: 120px;
    }

    .live-badge {
      display: inline-block;
      background: #d93025;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 999px;
      margin-bottom: 6px;
    }

    .red-card {
      display: inline-block;
      width: 9px;
      height: 13px;
      background: #d93025;
      border-radius: 2px;
      transform: rotate(10deg);
      margin-left: 6px;
      vertical-align: -1px;
    }

    .empty-state {
      padding: 28px;
      color: #666;
      font-size: 14px;
    }

    /* TABLE TAB */
    .tables-container {
      background: #fff;
    }

    .standings-block {
      padding: 22px 20px 30px;
      border-bottom: 1px solid #d9d9d9;
    }

    .standings-title {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 12px;
      color: #202124;
    }

    .standings-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .standings-table thead th {
      height: 34px;
      font-size: 16px;
      font-weight: 400;
      color: #666;
      border-bottom: 1px solid #d0d0d0;
      text-align: center;
    }

    .standings-table thead th.team-head {
      text-align: left;
    }

    .standings-table thead th.pts-head {
      color: #202124;
      font-weight: 700;
    }

    .standings-table tbody td {
      height: 61px;
      border-bottom: 1px solid #d9d9d9;
      font-size: 20px;
      color: #202124;
      text-align: center;
      vertical-align: middle;
    }

    .standings-table tbody tr:last-child td {
      border-bottom: none;
    }

    .rank-col {
      width: 38px;
    }

    .team-col {
      width: auto;
    }

    .stat-col {
      width: 46px;
    }

    .rank-cell {
      color: #202124;
      font-size: 20px;
    }

    .standing-team {
      display: flex;
      align-items: center;
      gap: 20px;
      min-width: 0;
    }

    .standing-flag {
      width: 31px;
      height: 23px;
      object-fit: cover;
      border-radius: 3px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.12);
      flex: 0 0 auto;
    }

    .standing-name {
      font-size: 20px;
      color: #202124;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pts-cell {
      font-weight: 700;
    }

    @media (max-width: 760px) {
      .page {
        border-left: none;
        border-right: none;
      }

      .tabs {
        padding: 0 16px;
      }

      .match-grid {
        grid-template-columns: 1fr;
      }

      .match-card {
        border-right: none !important;
        grid-template-columns: 1fr 118px;
        padding: 20px 16px;
      }

      .topbar,
      .status-line,
      .day-header {
        padding-left: 16px;
        padding-right: 16px;
      }

      .team-name {
        font-size: 15px;
      }

      .right-panel {
        padding-left: 14px;
      }

      .standings-block {
        padding: 20px 12px 28px;
        overflow-x: auto;
      }

      .standings-title {
        font-size: 22px;
        margin-left: 4px;
      }

      .standings-table {
        min-width: 690px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="topbar">
      <h1>World Cup 2026</h1>
      <button class="refresh-btn" onclick="fetchData()">Refresh</button>
    </div>

    <div class="tabs">
      <button id="matches-tab" class="tab-btn active" onclick="switchTab('matches')">Matches</button>
      <button id="table-tab" class="tab-btn" onclick="switchTab('table')">Table</button>
    </div>

    <div id="api-status" class="status-line">Loading data...</div>

    <div id="matches-view" class="tab-view active">
      <div id="games-container"></div>
    </div>

    <div id="table-view" class="tab-view">
      <div id="tables-container" class="tables-container"></div>
    </div>
  </div>

  <script>
    const GAMES_API_URL = "https://worldcup26.ir/get/games";
    const TEAMS_API_URL = "https://worldcup26.ir/get/teams";
    const GROUPS_API_URL = "https://worldcup26.ir/get/groups";
    const PROXY_URL = "https://api.allorigins.win/get?url=";

    const statusEl = document.getElementById("api-status");
    const gamesContainer = document.getElementById("games-container");
    const tablesContainer = document.getElementById("tables-container");

    let teamsById = {};
    let teamsByName = {};

    const STADIUMS = {
      "1":  { name: "Estadio Azteca", city: "Mexico City", offsetToWIB: 13 },
      "2":  { name: "Estadio Akron", city: "Guadalajara", offsetToWIB: 13 },
      "3":  { name: "Estadio BBVA", city: "Monterrey", offsetToWIB: 13 },

      "4":  { name: "AT&T Stadium", city: "Dallas", offsetToWIB: 12 },
      "5":  { name: "NRG Stadium", city: "Houston", offsetToWIB: 12 },
      "6":  { name: "Arrowhead Stadium", city: "Kansas City", offsetToWIB: 12 },

      "7":  { name: "Mercedes-Benz Stadium", city: "Atlanta", offsetToWIB: 11 },
      "8":  { name: "Hard Rock Stadium", city: "Miami", offsetToWIB: 11 },
      "9":  { name: "Gillette Stadium", city: "Boston", offsetToWIB: 11 },
      "10": { name: "Lincoln Financial Field", city: "Philadelphia", offsetToWIB: 11 },
      "11": { name: "MetLife Stadium", city: "New York/New Jersey", offsetToWIB: 11 },
      "12": { name: "BMO Field", city: "Toronto", offsetToWIB: 11 },

      "13": { name: "BC Place", city: "Vancouver", offsetToWIB: 14 },
      "14": { name: "Lumen Field", city: "Seattle", offsetToWIB: 14 },
      "15": { name: "Levi's Stadium", city: "San Francisco Bay Area", offsetToWIB: 14 },
      "16": { name: "SoFi Stadium", city: "Los Angeles", offsetToWIB: 14 }
    };

    function switchTab(tabName) {
      document.getElementById("matches-tab").classList.toggle("active", tabName === "matches");
      document.getElementById("table-tab").classList.toggle("active", tabName === "table");

      document.getElementById("matches-view").classList.toggle("active", tabName === "matches");
      document.getElementById("table-view").classList.toggle("active", tabName === "table");
    }

    function showStatus(message, type = "info") {
      statusEl.classList.remove("hidden");
      statusEl.style.color = type === "error" ? "#d93025" : "#666";
      statusEl.textContent = message;
    }

    function hideStatus() {
      statusEl.classList.add("hidden");
      statusEl.textContent = "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function fetchJson(url) {
      try {
        const response = await fetch(url);
        const text = await response.text();

        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        return JSON.parse(text);
      } catch (directError) {
        const proxyResponse = await fetch(PROXY_URL + encodeURIComponent(url));
        const proxyJson = await proxyResponse.json();

        if (!proxyJson.contents) {
          throw new Error("Proxy returned empty response");
        }

        return JSON.parse(proxyJson.contents);
      }
    }

    function extractArray(json, key) {
      if (Array.isArray(json)) return json;
      if (Array.isArray(json[key])) return json[key];
      if (Array.isArray(json.data)) return json.data;
      return [];
    }

    function toNumber(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : 0;
    }

    function buildTeamLookup(teams) {
      teamsById = {};
      teamsByName = {};

      teams.forEach(team => {
        if (team.id) teamsById[String(team.id)] = team;
        if (team._id) teamsById[String(team._id)] = team;

        if (team.name_en) {
          teamsByName[String(team.name_en).toLowerCase()] = team;
        }

        if (team.fifa_code) {
          teamsByName[String(team.fifa_code).toLowerCase()] = team;
        }
      });
    }

    function normalizeDisplayName(name) {
      const map = {
        "United States": "USA",
        "Czech Republic": "Czechia",
        "Turkey": "Türkiye",
        "Turkiye": "Türkiye"
      };

      return map[name] || name;
    }

    function getTeamById(teamId) {
      const team = teamsById[String(teamId)] || {};

      return {
        id: team.id || teamId,
        name: normalizeDisplayName(team.name_en || `Team ${teamId}`),
        flag: team.flag || "",
        group: team.groups || ""
      };
    }

    function getTeam(game, side) {
      const teamId = game[`${side}_team_id`];

      const apiName =
        game[`${side}_team_name_en`] ||
        game[`${side}_team`] ||
        game[`${side}_name`] ||
        "";

      const team =
        teamsById[String(teamId)] ||
        teamsByName[String(apiName).toLowerCase()] ||
        {};

      return {
        id: team.id || teamId,
        name: normalizeDisplayName(team.name_en || apiName || "-"),
        flag: team.flag || game[`${side}_flag`] || "",
        group: team.groups || game.group || ""
      };
    }

    function getStadium(game) {
      return STADIUMS[String(game.stadium_id)] || {
        name: "",
        city: "",
        offsetToWIB: 11
      };
    }

    function parseVenueLocalDate(raw) {
      if (!raw) return null;

      const value = String(raw).trim();

      // API format: MM/DD/YYYY HH:mm
      const match = value.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{2})/);

      if (!match) return null;

      return {
        month: Number(match[1]),
        day: Number(match[2]),
        year: Number(match[3]),
        hour: Number(match[4]),
        minute: Number(match[5])
      };
    }

    function getWibDate(game) {
      const stadium = getStadium(game);

      const venue = parseVenueLocalDate(
        game.local_date ||
        game.date ||
        game.datetime ||
        game.match_date ||
        game.start_time
      );

      if (!venue) return null;

      return new Date(Date.UTC(
        venue.year,
        venue.month - 1,
        venue.day,
        venue.hour + stadium.offsetToWIB,
        venue.minute
      ));
    }

    function getTodayWibDate() {
      return new Date(Date.now() + 7 * 60 * 60 * 1000);
    }

    function dateKey(date) {
      if (!date) return "unknown";

      const y = date.getUTCFullYear();
      const m = String(date.getUTCMonth() + 1).padStart(2, "0");
      const d = String(date.getUTCDate()).padStart(2, "0");

      return `${y}-${m}-${d}`;
    }

    function startOfUtcDay(date) {
      return Date.UTC(
        date.getUTCFullYear(),
        date.getUTCMonth(),
        date.getUTCDate()
      );
    }

    function dayDiff(dateA, dateB) {
      return Math.round((startOfUtcDay(dateA) - startOfUtcDay(dateB)) / 86400000);
    }

    function getRelativeDateLabel(date) {
      if (!date) return "";

      const diff = dayDiff(date, getTodayWibDate());

      if (diff === -1) return "Yesterday";
      if (diff === 0) return "Today";
      if (diff === 1) return "Tomorrow";

      return date.toLocaleDateString("en-GB", {
        timeZone: "UTC",
        weekday: "short",
        day: "2-digit",
        month: "short"
      });
    }

    function formatDateHeader(date) {
      if (!date) return "Group Stage";
      return "Group Stage · " + getRelativeDateLabel(date);
    }

    function formatWibTime(date) {
      if (!date) return "-";

      const hh = String(date.getUTCHours()).padStart(2, "0");
      const mm = String(date.getUTCMinutes()).padStart(2, "0");

      return `${hh}:${mm}`;
    }

    function formatVenueTime(game) {
      const venue = parseVenueLocalDate(game.local_date);
      if (!venue) return "";

      const hh = String(venue.hour).padStart(2, "0");
      const mm = String(venue.minute).padStart(2, "0");

      return `${hh}:${mm} local`;
    }

    function isFinished(game) {
      return (
        game.finished === true ||
        game.finished === "TRUE" ||
        game.finished === "true" ||
        String(game.time_elapsed || "").toLowerCase() === "finished" ||
        game.status === "FT"
      );
    }

    function isLive(game) {
      const elapsed = String(game.time_elapsed || "").toLowerCase();

      return (
        !isFinished(game) &&
        elapsed &&
        elapsed !== "notstarted" &&
        elapsed !== "not started" &&
        elapsed !== "scheduled"
      );
    }

    function getScore(game, side) {
      const value =
        game[`${side}_score`] ??
        game[`${side}_goals`] ??
        "";

      return value === null || value === undefined || value === "" ? "" : value;
    }

    function parseRedCards(raw) {
      if (!raw || raw === "null" || raw === "{}") return [];

      return String(raw)
        .replace(/[{}"“”]/g, "")
        .split(",")
        .map(x => x.trim())
        .filter(Boolean);
    }

    function hasRedCardForTeam(game, side) {
      const raw =
        game[`${side}_red_cards`] ||
        game[`${side}_redcards`] ||
        game[`${side}_red_card`] ||
        "";

      return parseRedCards(raw).length > 0;
    }

    function getGroupName(game, homeTeam) {
      const group = game.group || homeTeam.group || "";

      if (!group) return "Group";
      return String(group).toLowerCase().includes("group") ? group : `Group ${group}`;
    }

    function renderTimePanel(game, wibDate) {
      const stadium = getStadium(game);
      const finished = isFinished(game);
      const live = isLive(game);

      if (live) {
        return `
          <div class="right-panel">
            <div class="live-badge">LIVE</div>
            <div class="date-text">${escapeHtml(getRelativeDateLabel(wibDate))}</div>
            <div class="time-box">
              <div class="time-label">Elapsed</div>
              <div class="time-value">${escapeHtml(game.time_elapsed)}</div>
            </div>
            <div class="small-note">${escapeHtml(stadium.city)}</div>
          </div>
        `;
      }

      return `
        <div class="right-panel">
          <div class="status-text">${finished ? "FT" : "Kick-off"}</div>
          <div class="date-text">${escapeHtml(getRelativeDateLabel(wibDate))}</div>
          <div class="time-box">
            <div class="time-label">WIB</div>
            <div class="time-value">${escapeHtml(formatWibTime(wibDate))}</div>
          </div>
          <div class="small-note">${escapeHtml(stadium.city)}</div>
          <div class="small-note">${escapeHtml(formatVenueTime(game))}</div>
        </div>
      `;
    }

    function groupGamesByDate(games) {
      const sortedGames = [...games].sort((a, b) => {
        const da = getWibDate(a);
        const db = getWibDate(b);

        return (da?.getTime() || 0) - (db?.getTime() || 0);
      });

      return sortedGames.reduce((acc, game) => {
        const date = getWibDate(game);
        const key = dateKey(date);

        if (!acc[key]) {
          acc[key] = {
            date,
            games: []
          };
        }

        acc[key].games.push(game);
        return acc;
      }, {});
    }

    function renderMatchCard(game) {
      const wibDate = getWibDate(game);

      const homeTeam = getTeam(game, "home");
      const awayTeam = getTeam(game, "away");

      return `
        <div class="match-card">
          <div>
            <div class="group-label">${escapeHtml(getGroupName(game, homeTeam))}</div>

            <div class="team-row">
              <img class="flag" src="${escapeHtml(homeTeam.flag)}" alt="" onerror="this.style.visibility='hidden'">
              <div class="team-name">
                ${escapeHtml(homeTeam.name)}
                ${hasRedCardForTeam(game, "home") ? `<span class="red-card"></span>` : ""}
              </div>
              <div class="score">${escapeHtml(getScore(game, "home"))}</div>
            </div>

            <div class="team-row">
              <img class="flag" src="${escapeHtml(awayTeam.flag)}" alt="" onerror="this.style.visibility='hidden'">
              <div class="team-name">
                ${escapeHtml(awayTeam.name)}
                ${hasRedCardForTeam(game, "away") ? `<span class="red-card"></span>` : ""}
              </div>
              <div class="score">${escapeHtml(getScore(game, "away"))}</div>
            </div>
          </div>

          ${renderTimePanel(game, wibDate)}
        </div>
      `;
    }

    function renderGames(games) {
      const grouped = groupGamesByDate(games);

      gamesContainer.innerHTML = Object.values(grouped).map(section => {
        return `
          <section>
            <div class="day-header">${escapeHtml(formatDateHeader(section.date))}</div>
            <div class="match-grid">
              ${section.games.map(renderMatchCard).join("")}
            </div>
          </section>
        `;
      }).join("");
    }

    function getGroupSortValue(groupName) {
      const letter = String(groupName || "").trim().toUpperCase();
      return letter.charCodeAt(0) || 999;
    }

    function emptyStandingRow(teamId, groupName) {
      const team = getTeamById(teamId);

      return {
        team_id: String(teamId),
        group: groupName,
        name: team.name,
        flag: team.flag,
        mp: 0,
        w: 0,
        d: 0,
        l: 0,
        gf: 0,
        ga: 0,
        gd: 0,
        pts: 0
      };
    }

    function buildStandings(groups, games) {
      const groupMap = {};

      groups.forEach(group => {
        const groupName = String(group.name || "").trim();

        if (!groupName) return;

        if (!groupMap[groupName]) {
          groupMap[groupName] = {
            name: groupName,
            rowsByTeamId: {}
          };
        }

        (group.teams || []).forEach(row => {
          const teamId = String(row.team_id);
          const team = getTeamById(teamId);

          groupMap[groupName].rowsByTeamId[teamId] = {
            team_id: teamId,
            group: groupName,
            name: team.name,
            flag: team.flag,
            mp: toNumber(row.mp),
            w: toNumber(row.w),
            d: toNumber(row.d),
            l: toNumber(row.l),
            gf: toNumber(row.gf),
            ga: toNumber(row.ga),
            gd: toNumber(row.gd),
            pts: toNumber(row.pts)
          };
        });
      });

      // Backup kalau groups API kosong: pakai data group dari teams API.
      Object.values(teamsById).forEach(team => {
        const groupName = String(team.groups || "").trim();
        if (!groupName) return;

        if (!groupMap[groupName]) {
          groupMap[groupName] = {
            name: groupName,
            rowsByTeamId: {}
          };
        }

        if (!groupMap[groupName].rowsByTeamId[String(team.id)]) {
          groupMap[groupName].rowsByTeamId[String(team.id)] = emptyStandingRow(team.id, groupName);
        }
      });

      const groupApiHasStats = Object.values(groupMap).some(group => {
        return Object.values(group.rowsByTeamId).some(row => {
          return row.mp || row.w || row.d || row.l || row.gf || row.ga || row.gd || row.pts;
        });
      });

      // Kalau group API belum update standings, hitung dari finished games.
      if (!groupApiHasStats) {
        Object.values(groupMap).forEach(group => {
          Object.values(group.rowsByTeamId).forEach(row => {
            row.mp = 0;
            row.w = 0;
            row.d = 0;
            row.l = 0;
            row.gf = 0;
            row.ga = 0;
            row.gd = 0;
            row.pts = 0;
          });
        });

        games.filter(game => String(game.type || "").toLowerCase() === "group" && isFinished(game)).forEach(game => {
          const groupName = String(game.group || "").trim();
          if (!groupName) return;

          if (!groupMap[groupName]) {
            groupMap[groupName] = {
              name: groupName,
              rowsByTeamId: {}
            };
          }

          const homeId = String(game.home_team_id);
          const awayId = String(game.away_team_id);

          if (!groupMap[groupName].rowsByTeamId[homeId]) {
            groupMap[groupName].rowsByTeamId[homeId] = emptyStandingRow(homeId, groupName);
          }

          if (!groupMap[groupName].rowsByTeamId[awayId]) {
            groupMap[groupName].rowsByTeamId[awayId] = emptyStandingRow(awayId, groupName);
          }

          const home = groupMap[groupName].rowsByTeamId[homeId];
          const away = groupMap[groupName].rowsByTeamId[awayId];

          const homeScore = toNumber(game.home_score);
          const awayScore = toNumber(game.away_score);

          home.mp += 1;
          away.mp += 1;

          home.gf += homeScore;
          home.ga += awayScore;
          away.gf += awayScore;
          away.ga += homeScore;

          home.gd = home.gf - home.ga;
          away.gd = away.gf - away.ga;

          if (homeScore > awayScore) {
            home.w += 1;
            away.l += 1;
            home.pts += 3;
          } else if (homeScore < awayScore) {
            away.w += 1;
            home.l += 1;
            away.pts += 3;
          } else {
            home.d += 1;
            away.d += 1;
            home.pts += 1;
            away.pts += 1;
          }
        });
      }

      return Object.values(groupMap)
        .sort((a, b) => getGroupSortValue(a.name) - getGroupSortValue(b.name))
        .map(group => {
          const rows = Object.values(group.rowsByTeamId)
            .sort((a, b) => {
              return (
                b.pts - a.pts ||
                b.gd - a.gd ||
                b.gf - a.gf ||
                a.name.localeCompare(b.name)
              );
            });

          return {
            name: group.name,
            rows
          };
        });
    }

    function renderTables(groups, games) {
      const standings = buildStandings(groups, games);

      if (!standings.length) {
        tablesContainer.innerHTML = `<div class="empty-state">No group table data found.</div>`;
        return;
      }

      tablesContainer.innerHTML = standings.map(group => {
        return `
          <section class="standings-block">
            <h2 class="standings-title">Group ${escapeHtml(group.name)}</h2>

            <table class="standings-table">
              <colgroup>
                <col class="rank-col">
                <col class="team-col">
                <col class="stat-col">
                <col class="stat-col">
                <col class="stat-col">
                <col class="stat-col">
                <col class="stat-col">
                <col class="stat-col">
                <col class="stat-col">
                <col class="stat-col">
              </colgroup>

              <thead>
                <tr>
                  <th colspan="2" class="team-head">Team</th>
                  <th>MP</th>
                  <th>W</th>
                  <th>D</th>
                  <th>L</th>
                  <th>GF</th>
                  <th>GA</th>
                  <th>GD</th>
                  <th class="pts-head">Pts</th>
                </tr>
              </thead>

              <tbody>
                ${group.rows.map((row, index) => `
                  <tr>
                    <td class="rank-cell">${index + 1}</td>
                    <td>
                      <div class="standing-team">
                        <img class="standing-flag" src="${escapeHtml(row.flag)}" alt="" onerror="this.style.visibility='hidden'">
                        <span class="standing-name">${escapeHtml(row.name)}</span>
                      </div>
                    </td>
                    <td>${row.mp}</td>
                    <td>${row.w}</td>
                    <td>${row.d}</td>
                    <td>${row.l}</td>
                    <td>${row.gf}</td>
                    <td>${row.ga}</td>
                    <td>${row.gd}</td>
                    <td class="pts-cell">${row.pts}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </section>
        `;
      }).join("");
    }

    async function fetchData() {
      showStatus("Loading data...");

      try {
        const [gamesJson, teamsJson, groupsJson] = await Promise.all([
          fetchJson(GAMES_API_URL),
          fetchJson(TEAMS_API_URL),
          fetchJson(GROUPS_API_URL)
        ]);

        const gamesArray = extractArray(gamesJson, "games");
        const teamsArray = extractArray(teamsJson, "teams");
        const groupsArray = extractArray(groupsJson, "groups");

        buildTeamLookup(teamsArray);

        if (!gamesArray.length) {
          gamesContainer.innerHTML = `<div class="empty-state">No games found.</div>`;
        } else {
          renderGames(gamesArray);
        }

        renderTables(groupsArray, gamesArray);
        hideStatus();

      } catch (error) {
        console.error(error);
        showStatus("Failed to load data. Please check API connection or CORS proxy.", "error");

        gamesContainer.innerHTML = `
          <div class="empty-state">
            Data tidak bisa dimuat. Coba klik Refresh, atau buka lewat local server / Apps Script, bukan langsung file local.
          </div>
        `;

        tablesContainer.innerHTML = `
          <div class="empty-state">
            Table data tidak bisa dimuat.
          </div>
        `;
      }
    }

    window.onload = fetchData;
  </script>
</body>
